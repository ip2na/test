name: Build chime Kernel

on:
  workflow_dispatch:
    inputs:
      clang:
        description: "Clang toolchain"
        required: true
        default: "aosp"
        type: choice
        options:
          - aosp
          - greenforce
          - llvm
          - zyc

jobs:
  build:
    name: Build chime Kernel
    runs-on: ubuntu-latest

    steps:
      - name: Set Clang Variables
        run: |
          case "${{ github.event.inputs.clang }}" in
            greenforce)
              CLANG_URL="https://github.com/greenforce-project/greenforce_clang/releases/download/20260410/gf-clang-22.1.4-20260410.tar.gz"
              CLANG_TYPE="mkdir"
              ;;
            llvm)
              CLANG_URL="https://mirrors.edge.kernel.org/pub/tools/llvm/files/llvm-22.1.4-x86_64.tar.gz"
              CLANG_TYPE="llvm"
              ;;
            zyc)
              CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250401-release/Clang-20.0.0git-20250401.tar.gz"
              CLANG_TYPE="mkdir"
              ;;
            aosp)
              CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz"
              CLANG_TYPE="mkdir"
              ;;
          esac
          FILENAME=$(basename "$CLANG_URL" .tar.gz)
          echo "CLANG_URL=$CLANG_URL" >> $GITHUB_ENV
          echo "CLANG_TYPE=$CLANG_TYPE" >> $GITHUB_ENV
          echo "CLANG_DIR=$FILENAME" >> $GITHUB_ENV
          echo "CLANG_CACHE_KEY=$FILENAME" >> $GITHUB_ENV

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo apt clean

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git curl wget bc bison flex libssl-dev libelf-dev zip cpio

      - name: Cache Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/${{ env.CLANG_DIR }}
          key: ${{ env.CLANG_CACHE_KEY }}

      - name: Setup Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          if [ "$CLANG_TYPE" = "llvm" ]; then
            wget "$CLANG_URL"
            tar -zxf "$(basename "$CLANG_URL")"
            rm -f "$(basename "$CLANG_URL")"
          else
            mkdir -p "$CLANG_DIR"
            wget -O clang.tar.gz "$CLANG_URL"
            tar -zxf clang.tar.gz -C "$CLANG_DIR"
            rm -f clang.tar.gz
          fi

      - name: Set Clang PATH
        run: echo "CLANG_PATH=$(pwd)/$CLANG_DIR/bin" >> $GITHUB_ENV

      - name: Clone Kernel Source
        run: |
          git clone --branch susfs --depth=1 https://github.com/ip2na/valeryn_xiaomi_sm6115.git kernel

      - name: Setup KernelSU Next (Hookless)
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/Sorayukii/KernelSU-Next/stable/kernel/setup.sh" | bash -s hookless

      - name: Inject Config
        run: |
          CONFIG_FILE="kernel/arch/arm64/configs/vendor/bengal-perf_defconfig"
          printf '%s\n' "${{ secrets.VALERYN_CONFIG_LINES }}" >> "$CONFIG_FILE"
          echo "Config injected:"
          tail -20 "$CONFIG_FILE"

      - name: Build Kernel
        run: |
          cd kernel
          export TZ="Asia/Jakarta"
          export PATH="$CLANG_PATH:$PATH"
          export KBUILD_BUILD_USER="builder-dev"
          export KBUILD_BUILD_HOST="anyaprjk"
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 O=out CROSS_COMPILE=aarch64-linux-gnu- vendor/bengal-perf_defconfig
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 O=out CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc --all) Image.gz dtbs

      - name: Generate Build Info
        run: |
          echo "BRANCH=$(git -C kernel rev-parse --abbrev-ref HEAD)" >> $GITHUB_ENV
          echo "COMMIT=$(git -C kernel log -1 --pretty=format:'%s (%an)')" >> $GITHUB_ENV
          echo "KERNEL_VER=$(cat kernel/out/include/generated/utsrelease.h | sed 's/.*\"\(.*\)\".*/\1/')" >> $GITHUB_ENV
          echo "COMPILER=$($CLANG_PATH/clang --version | head -n 1)" >> $GITHUB_ENV
          echo "DATE=$(TZ=Asia/Jakarta date '+%d/%m/%Y %H:%M WIB')" >> $GITHUB_ENV
          echo "ZIP_NAME=Valeryn-SM6115-${{ github.run_number }}.zip" >> $GITHUB_ENV

      - name: Clone AnyKernel3
        run: |
          git clone -b gki-1.0 --depth=1 https://github.com/ip2na/Anykernel3.git ak3

      - name: Copy Kernel Artifacts
        run: |
          mkdir -p ak3/dtbs
          cp kernel/out/arch/arm64/boot/Image.gz ak3/
          find kernel/out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} ak3/dtbs/ \; 2>/dev/null || true
          if [ -f kernel/out/arch/arm64/boot/dtbo.img ]; then
            cp kernel/out/arch/arm64/boot/dtbo.img ak3/
          fi

      - name: Pack ZIP
        run: |
          cd ak3
          zip -r9 "$ZIP_NAME" * -x "*.git*" -x "*.github*"
          ls -lh "$ZIP_NAME"

      - name: Send ZIP to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ZIP_PATH: ${{ github.workspace }}/ak3/${{ env.ZIP_NAME }}
        run: |
          python3 - <<'EOF'
          import requests, os, sys

          token    = os.environ["TELEGRAM_TOKEN"]
          chat_id  = os.environ["TELEGRAM_CHAT_ID"]
          zip_path = os.environ["ZIP_PATH"]

          caption = (
            "<b>Valeryn Kernel \u2014 SM6115</b>\n"
            f"\U0001f331 <b>Branch:</b> <code>{os.environ['BRANCH']}</code>\n"
            f"\U0001f427 <b>Linux version:</b> <code>{os.environ['KERNEL_VER']}</code>\n"
            f"\U0001f4c6 <b>Build date:</b> <code>{os.environ['DATE']}</code>\n"
            f"\u267b\ufe0f <b>Latest commit:</b> {os.environ['COMMIT']}\n"
            f"\u2699\ufe0f <b>Compiler:</b> {os.environ['COMPILER']}"
          )

          print(f"Sending: {zip_path}")
          with open(zip_path, "rb") as f:
            r = requests.post(
              f"https://api.telegram.org/bot{token}/sendDocument",
              data={"chat_id": chat_id, "parse_mode": "HTML", "caption": caption},
              files={"document": f},
              timeout=300
            )

          print(f"Status: {r.status_code}")
          print(r.text)
          r.raise_for_status()
          EOF

      - name: Upload ZIP artifact (debug on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-zip-failed
          path: ak3/${{ env.ZIP_NAME }}
