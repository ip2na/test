name: Anya Kernel Matrix FX

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Kernel source branch"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - staging
      build_type:
        description: "Build type to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - susfs
          - vanilla
      clang:
        description: "Clang toolchain"
        required: true
        default: "greenforce"
        type: choice
        options:
          - greenforce
          - llvm
          - zyc
          - aosp

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: KSU+SUSFS
            type: susfs
            zip_suffix: Kernel-KSU-SUSFS
            release_base: AnyaKernel-GKI-5.10
            build_host: anyaprjkt
            telegram_version_label: "KSU Next + SUSFS"
            telegram_tags_main: "#Anyakernel #update #gki510 #ksu #susfs"
            telegram_tags_staging: "#Anyakernel #staging #gki510 #ksu #susfs"
            release_tags_main: "#Anyakernel #gki-5.10 #ksu #susfs"
            release_tags_staging: "#Anyakernel #staging #gki-5.10 #ksu #susfs"

          - name: Vanilla
            type: vanilla
            zip_suffix: Kernel-Vanilla
            release_base: AnyaKernel-Vanilla-5.10
            build_host: Anyaanasera
            telegram_version_label: "Vanilla (No KSU/SUSFS)"
            telegram_tags_main: "#Anyakernel #vanilla #gki510"
            telegram_tags_staging: "#Anyakernel #staging #vanilla #gki510"
            release_tags_main: "#Anyakernel #vanilla #gki-5.10"
            release_tags_staging: "#Anyakernel #staging #vanilla #gki-5.10"

    steps:
    - name: Check Build Type
      id: check
      run: |
        INPUT="${{ github.event.inputs.build_type }}"
        TYPE="${{ matrix.type }}"
        if [ "$INPUT" = "all" ] || [ "$INPUT" = "$TYPE" ]; then
          echo "should_run=true" >> $GITHUB_OUTPUT
        else
          echo "should_run=false" >> $GITHUB_OUTPUT
        fi

    - name: Resolve Branch-aware Variables
      if: steps.check.outputs.should_run == 'true'
      run: |
        BRANCH_INPUT="${{ github.event.inputs.branch }}"

        if [ "$BRANCH_INPUT" = "staging" ]; then
          echo "IS_STAGING=true" >> $GITHUB_ENV
          echo "KERNEL_BRANCH=staging" >> $GITHUB_ENV
          echo "ZIP_NAME=${{ matrix.zip_suffix }}-Staging.zip" >> $GITHUB_ENV
          echo "RELEASE_PREFIX=${{ matrix.release_base }}-Staging" >> $GITHUB_ENV
          echo "TELEGRAM_VERSION=${{ matrix.telegram_version_label }} [STAGING]" >> $GITHUB_ENV
          echo "TELEGRAM_TAGS=${{ matrix.telegram_tags_staging }}" >> $GITHUB_ENV
          echo "RELEASE_TAGS=${{ matrix.release_tags_staging }}" >> $GITHUB_ENV
        else
          echo "IS_STAGING=false" >> $GITHUB_ENV
          echo "KERNEL_BRANCH=main" >> $GITHUB_ENV
          echo "ZIP_NAME=${{ matrix.zip_suffix }}.zip" >> $GITHUB_ENV
          echo "RELEASE_PREFIX=${{ matrix.release_base }}" >> $GITHUB_ENV
          echo "TELEGRAM_VERSION=${{ matrix.telegram_version_label }}" >> $GITHUB_ENV
          echo "TELEGRAM_TAGS=${{ matrix.telegram_tags_main }}" >> $GITHUB_ENV
          echo "RELEASE_TAGS=${{ matrix.release_tags_main }}" >> $GITHUB_ENV
        fi

    - name: Set Clang Variables
      if: steps.check.outputs.should_run == 'true'
      run: |
        case "${{ github.event.inputs.clang }}" in
          greenforce)
            CLANG_URL="https://github.com/greenforce-project/greenforce_clang/releases/download/20260410/gf-clang-22.1.4-20260410.tar.gz"
            CLANG_TYPE="mkdir"
            ;;
          llvm)
            CLANG_URL="https://mirrors.edge.kernel.org/pub/tools/llvm/files/llvm-22.1.4-x86_64.tar.gz"
            CLANG_TYPE="llvm"
            ;;
          zyc)
            CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250401-release/Clang-20.0.0git-20250401.tar.gz"
            CLANG_TYPE="mkdir"
            ;;
          aosp)
            CLANG_URL="https://github.com/bachnxuan/aosp_clang_mirror/releases/download/clang-r584948b-14863223/clang-r584948b.tar.gz"
            CLANG_TYPE="mkdir"
            ;;
        esac
        FILENAME=$(basename $CLANG_URL .tar.gz)
        echo "CLANG_URL=$CLANG_URL" >> $GITHUB_ENV
        echo "CLANG_TYPE=$CLANG_TYPE" >> $GITHUB_ENV
        echo "CLANG_DIR=$FILENAME" >> $GITHUB_ENV
        echo "CLANG_CACHE_KEY=$FILENAME" >> $GITHUB_ENV

    - name: Checkout
      if: steps.check.outputs.should_run == 'true'
      uses: actions/checkout@v4

    - name: Set Build Tag
      if: steps.check.outputs.should_run == 'true'
      run: |
        if [ "$IS_STAGING" = "true" ]; then
          echo "RELEASE_TAG=${RELEASE_PREFIX}-${{ github.run_number }}-${{ github.run_attempt }}" >> $GITHUB_ENV
        else
          echo "RELEASE_TAG=${RELEASE_PREFIX}-${{ github.run_number }}" >> $GITHUB_ENV
        fi

    - name: Free Disk Space
      if: steps.check.outputs.should_run == 'true'
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo apt clean

    - name: Install Dependencies
      if: steps.check.outputs.should_run == 'true'
      run: |
        sudo apt update
        sudo apt install -y git curl wget bc bison flex libssl-dev libelf-dev zip cpio

    - name: Cache Clang
      if: steps.check.outputs.should_run == 'true'
      id: cache-clang
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/${{ env.CLANG_DIR }}
        key: ${{ env.CLANG_CACHE_KEY }}

    - name: Setup Clang
      if: steps.check.outputs.should_run == 'true' && steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        if [ "$CLANG_TYPE" = "llvm" ]; then
          wget $CLANG_URL
          tar -zxf $(basename $CLANG_URL)
          rm -rf $(basename $CLANG_URL)
        else
          mkdir -p $CLANG_DIR
          wget -O clang.tar.gz $CLANG_URL
          tar -zxf clang.tar.gz -C $CLANG_DIR
          rm -rf clang.tar.gz
        fi

    - name: Set Clang PATH
      if: steps.check.outputs.should_run == 'true'
      run: echo "CLANG_PATH=$(pwd)/$CLANG_DIR/bin" >> $GITHUB_ENV

    - name: Clone Kernel Source
      if: steps.check.outputs.should_run == 'true'
      run: |
        git clone --branch $KERNEL_BRANCH --depth=1 ${{ secrets.KERNEL_SOURCE }} kernel

    - name: Setup KernelSU Next + SUSFS
      if: steps.check.outputs.should_run == 'true' && matrix.type == 'susfs'
      run: |
        cd kernel
        curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/next-susfs/kernel/setup.sh" | bash -s dev-susfs

        cd KernelSU-Next
        echo "KSU_COMMIT=$(git log -1 --pretty=format:"%s (%an)")" >> $GITHUB_ENV
        cd ..

        git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu -b gki-android12-5.10 .susfs
        cd .susfs
        echo "SUSFS_COMMIT=$(git log -1 --pretty=format:"%s (%an)")" >> $GITHUB_ENV
        cd ..

        kernel_patches="$(pwd)/.susfs/kernel_patches"
        cp -R $kernel_patches/fs/* ./fs
        cp -R $kernel_patches/include/* ./include
        patch -p1 < $kernel_patches/*.patch || true

    - name: Apply All Managers Patch
      if: steps.check.outputs.should_run == 'true' && matrix.type == 'susfs'
      run: |
        cd kernel
        curl -LSs "${{ secrets.PATCH_URL }}" -o /tmp/ksun-allmanager.patch
        cd KernelSU-Next && patch -p1 < /tmp/ksun-allmanager.patch && cd ..

    - name: Inject Config
      if: steps.check.outputs.should_run == 'true'
      run: |
        DEFCONFIG="kernel/arch/arm64/configs/gki_defconfig"
        if [ "${{ matrix.type }}" = "susfs" ]; then
          printf '%s\n' "${{ secrets.CONFIG_LINES_SUSFS }}" >> "$DEFCONFIG"
        else
          printf '%s\n' "${{ secrets.CONFIG_LINES_VANILLA }}" >> "$DEFCONFIG"
        fi

    - name: Build Kernel
      if: steps.check.outputs.should_run == 'true'
      run: |
        cd kernel
        export TZ="Asia/Jakarta"
        export PATH="$CLANG_PATH:$PATH"
        export KBUILD_BUILD_USER="builder-dev"
        export KBUILD_BUILD_HOST="${{ matrix.build_host }}"
        make ARCH=arm64 LLVM=1 LLVM_IAS=1 O=out CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
        make ARCH=arm64 LLVM=1 LLVM_IAS=1 O=out CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc --all) Image

    - name: Generate Build Info
      if: steps.check.outputs.should_run == 'true'
      run: |
        cd kernel
        echo "BRANCH=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_ENV
        echo "COMMIT=$(git log -1 --pretty=format:"%s (%an)")" >> $GITHUB_ENV
        echo "KERNEL_VER=$(cat out/include/generated/utsrelease.h | sed 's/.*"\(.*\)".*/\1/')" >> $GITHUB_ENV
        echo "COMPILER=$($CLANG_PATH/clang --version | head -n 1)" >> $GITHUB_ENV
        echo "DATE=$(TZ=Asia/Jakarta date "+%d/%m/%Y %H:%M WIB")" >> $GITHUB_ENV

    - name: Clone AnyKernel3
      if: steps.check.outputs.should_run == 'true'
      run: |
        git clone --depth=1 -b gki-2.0 ${{ secrets.AK3_REPO }} ak3

    - name: Copy Image
      if: steps.check.outputs.should_run == 'true'
      run: |
        cp kernel/out/arch/arm64/boot/Image ak3/

    - name: Pack ZIP
      if: steps.check.outputs.should_run == 'true'
      run: |
        cd ak3
        zip -r9 $ZIP_NAME * -x "*.git*" -x "*.github*"

    - name: Send Changelog to Telegram
      if: steps.check.outputs.should_run == 'true'
      run: |
        RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG"
        if [ "${{ matrix.type }}" = "susfs" ]; then
          EXTRA_INFO="🔐 <b>KSU commit:</b> $KSU_COMMIT
        🛡️ <b>SUSFS commit:</b> $SUSFS_COMMIT"
        else
          EXTRA_INFO=""
        fi
        if [ "$IS_STAGING" = "true" ]; then
          STAGING_HEADER="⚠️ <b>[STAGING BUILD]</b>

        "
        else
          STAGING_HEADER=""
        fi
        MESSAGE="${STAGING_HEADER}<b>Anya Kernel — $TELEGRAM_VERSION</b>
        🌱 <b>Branch:</b> <code>$BRANCH</code>
        🐧 <b>Linux version:</b> <code>$KERNEL_VER</code>
        📆 <b>Build date:</b> <code>$DATE</code>
        🦎 <b>Version:</b> $TELEGRAM_VERSION
        ♻️ <b>Latest commit:</b> $COMMIT
        $EXTRA_INFO
        ⚙️ <b>Compiler:</b> $COMPILER

        $TELEGRAM_TAGS

        📥 <b>Download:</b> <a href=\"$RELEASE_URL\">GitHub Release</a>"
        curl --fail -s -X POST \
          "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.CHAT_ID }}" \
          -d "parse_mode=HTML" \
          -d "disable_web_page_preview=true" \
          --data-urlencode "text=$MESSAGE"

    - name: Cleanup Old Releases (keep latest 25)
      if: steps.check.outputs.should_run == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        RELEASES=$(gh release list --limit 100 --json tagName,createdAt \
          --jq 'sort_by(.createdAt) | reverse | .[25:] | .[].tagName')
        for TAG in $RELEASES; do
          echo "Deleting old release: $TAG"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
        done

    - name: Upload to GitHub Release
      if: steps.check.outputs.should_run == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ "${{ matrix.type }}" = "susfs" ]; then
          EXTRA_NOTES="**🔐 KSU commit:** $KSU_COMMIT
        **🛡️ SUSFS commit:** $SUSFS_COMMIT"
        else
          EXTRA_NOTES=""
        fi

        if [ "$IS_STAGING" = "true" ]; then
          RELEASE_TITLE="⚠️ [STAGING] Anya Kernel | $TELEGRAM_VERSION | GKI 5.10 | $DATE"
          RELEASE_NOTES="## ⚠️ STAGING BUILD — Anya Kernel — $TELEGRAM_VERSION

        > This build is from the **staging** branch. It is not a stable release.

        **🌿 Branch:** \`$BRANCH\`
        **🐧 Linux version:** \`$KERNEL_VER\`
        **📆 Build date:** \`$DATE\`
        **🦎 Version:** $TELEGRAM_VERSION
        **♻️ Latest commit:** $COMMIT
        $EXTRA_NOTES
        **⚙️ Compiler:** $COMPILER

        ---
        $RELEASE_TAGS"
          gh release create "$RELEASE_TAG" \
            ak3/$ZIP_NAME \
            --title "$RELEASE_TITLE" \
            --notes "$RELEASE_NOTES" \
            --prerelease \
          || gh release upload "$RELEASE_TAG" ak3/$ZIP_NAME --clobber
        else
          RELEASE_TITLE="Anya Kernel | $TELEGRAM_VERSION | GKI 5.10 | $DATE"
          RELEASE_NOTES="## 🌸 Anya Kernel — $TELEGRAM_VERSION

        **🌱 Branch:** \`$BRANCH\`
        **🐧 Linux version:** \`$KERNEL_VER\`
        **📆 Build date:** \`$DATE\`
        **🦎 Version:** $TELEGRAM_VERSION
        **♻️ Latest commit:** $COMMIT
        $EXTRA_NOTES
        **⚙️ Compiler:** $COMPILER

        ---
        $RELEASE_TAGS"
          gh release create "$RELEASE_TAG" \
            ak3/$ZIP_NAME \
            --title "$RELEASE_TITLE" \
            --notes "$RELEASE_NOTES" \
            --latest
        fi
