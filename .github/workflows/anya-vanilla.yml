name: Anya Vanilla GH

on:
  workflow_dispatch:

env:

  # --- LLVM (kernel.org) ---
  CLANG_URL: https://mirrors.edge.kernel.org/pub/tools/llvm/files/llvm-22.1.3-x86_64.tar.gz
  CLANG_TYPE: llvm

  # --- Greenforce Clang ---
  # CLANG_URL: https://github.com/greenforce-project/greenforce_clang/releases/download/20260410/gf-clang-22.1.4-20260410.tar.gz
  # CLANG_TYPE: mkdir

  # --- ZyC Clang ---
  # CLANG_URL: https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250401-release/Clang-20.0.0git-20250401.tar.gz
  # CLANG_TYPE: mkdir

  # --- Google Clang (AOSP) ---
  # CLANG_URL: https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz
  # CLANG_TYPE: mkdir

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set Build Tag
      run: echo "RELEASE_TAG=AnyaKernel-Vanilla-5.10-${{ github.run_number }}" >> $GITHUB_ENV

    - name: Set Clang Variables
      run: |
        FILENAME=$(basename $CLANG_URL .tar.gz)
        echo "CLANG_DIR=$FILENAME" >> $GITHUB_ENV
        echo "CLANG_CACHE_KEY=$FILENAME" >> $GITHUB_ENV

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo apt clean

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y git curl wget bc bison flex libssl-dev libelf-dev zip cpio

    - name: Cache Clang
      id: cache-clang
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/${{ env.CLANG_DIR }}
        key: ${{ env.CLANG_CACHE_KEY }}

    - name: Setup Clang
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        if [ "$CLANG_TYPE" = "llvm" ]; then
          wget $CLANG_URL
          tar -zxf $(basename $CLANG_URL)
          rm -rf $(basename $CLANG_URL)
        else
          mkdir -p $CLANG_DIR
          wget -O clang.tar.gz $CLANG_URL
          tar -zxf clang.tar.gz -C $CLANG_DIR
          rm -rf clang.tar.gz
        fi

    - name: Set Clang PATH
      run: echo "CLANG_PATH=$(pwd)/$CLANG_DIR/bin" >> $GITHUB_ENV

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 ${{ secrets.KERNEL_SOURCE }} kernel

    - name: Inject Config
      run: |
        cd kernel
        echo "${{ secrets.VANILLA_CONFIG_SCRIPT }}" | base64 -d | bash

    - name: Build Kernel
      run: |
        cd kernel
        export PATH="$CLANG_PATH:$PATH"
        export KBUILD_BUILD_USER="builder-dev"
        export KBUILD_BUILD_HOST="Anyaanasera"
        make ARCH=arm64 LLVM=1 LLVM_IAS=1 O=out CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
        make ARCH=arm64 LLVM=1 LLVM_IAS=1 O=out CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc --all) Image

    - name: Generate Build Info
      run: |
        cd kernel
        echo "BRANCH=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_ENV
        echo "COMMIT=$(git log -1 --pretty=format:"%s (%an)")" >> $GITHUB_ENV
        echo "KERNEL_VER=$(cat out/include/generated/utsrelease.h | sed 's/.*"\(.*\)".*/\1/')" >> $GITHUB_ENV
        echo "COMPILER=$($CLANG_PATH/clang --version | head -n 1)" >> $GITHUB_ENV
        echo "DATE=$(date "+%d%m%y")" >> $GITHUB_ENV

    - name: Clone AnyKernel3
      run: |
        git clone --depth=1 -b gki-2.0 ${{ secrets.AK3_REPO }} ak3

    - name: Copy Image
      run: |
        cp kernel/out/arch/arm64/boot/Image ak3/

    - name: Pack ZIP
      run: |
        cd ak3
        zip -r9 Kernel-Vanilla.zip * -x "*.git*" -x "*.github*"

    - name: Send Changelog to Telegram
      run: |
        RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG"
        MESSAGE="<b>Anya Kernel — Vanilla GKI 5.10</b>
        🌱 <b>Branch:</b> <code>$BRANCH</code>
        🐧 <b>Linux version:</b> <code>$KERNEL_VER</code>
        📆 <b>Build date:</b> <code>$DATE</code>
        🦎 <b>Version:</b> Vanilla (No KSU/SUSFS)
        ♻️ <b>Latest commit:</b> $COMMIT
        ⚙️ <b>Compiler:</b> $COMPILER

        #Anyakernel #vanilla #gki510

        📥 <b>Download:</b> <a href=\"$RELEASE_URL\">GitHub Release</a>"
        curl --fail -s -X POST \
          "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.CHAT_ID }}" \
          -d "parse_mode=HTML" \
          -d "disable_web_page_preview=true" \
          --data-urlencode "text=$MESSAGE"

    - name: Cleanup Old Releases (keep latest 25)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        RELEASES=$(gh release list --limit 100 --json tagName,createdAt \
          --jq 'sort_by(.createdAt) | reverse | .[25:] | .[].tagName')
        for TAG in $RELEASES; do
          echo "Deleting old release: $TAG"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
        done

    - name: Upload to GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "$RELEASE_TAG" \
          ak3/Kernel-Vanilla.zip \
          --title "Anya Kernel | Vanilla | GKI 5.10 | $DATE" \
          --notes "## 🌸 Anya Kernel — Vanilla GKI 5.10

        **🌱 Branch:** \`$BRANCH\`
        **🐧 Linux version:** \`$KERNEL_VER\`
        **📆 Build date:** \`$DATE\`
        **🦎 Version:** Vanilla (No KSU/SUSFS)
        **♻️ Latest commit:** $COMMIT
        **⚙️ Compiler:** $COMPILER

        ---
        #Anyakernel #vanilla #gki-5.10" \
          --latest
