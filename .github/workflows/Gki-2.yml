name: Anya Kernel — Matrix CI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Kernel source branch"
        required: true
        default: main
        type: choice
        options:
          - main
          - staging
          - linux-stable
          - linux-staging

      build_type:
        description: "Build variant"
        required: true
        default: susfs
        type: choice
        options:
          - all
          - susfs
          - vanilla

      clang:
        description: "Clang toolchain"
        required: true
        default: greenforce
        type: choice
        options:
          - greenforce
          - llvm
          - zyc
          - aosp

# ---------------------------------------------------------------------------
# Matrix definitions
# ---------------------------------------------------------------------------
jobs:
  build:
    name: "Build [${{ matrix.name }}]"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: KSU+SUSFS
            type: susfs
            zip_suffix: Kernel-KSU-SUSFS
            release_base: AnyaKernel-GKI-5.10
            build_host: anyaprjkt
            telegram_label: "KSU Next + SUSFS"
            telegram_tags_main: "#Anyakernel #update #gki510 #ksu #susfs"
            telegram_tags_staging: "#Anyakernel #staging #gki510 #ksu #susfs"
            release_tags_main: "#Anyakernel #gki-5.10 #ksu #susfs"
            release_tags_staging: "#Anyakernel #staging #gki-5.10 #ksu #susfs"

          - name: Vanilla
            type: vanilla
            zip_suffix: Kernel-Vanilla
            release_base: AnyaKernel-Vanilla-5.10
            build_host: anyaprjkt
            telegram_label: "Vanilla (No KSU/SUSFS)"
            telegram_tags_main: "#Anyakernel #vanilla #gki510"
            telegram_tags_staging: "#Anyakernel #staging #vanilla #gki510"
            release_tags_main: "#Anyakernel #vanilla #gki-5.10"
            release_tags_staging: "#Anyakernel #staging #vanilla #gki-5.10"

    # -------------------------------------------------------------------------
    # Steps
    # -------------------------------------------------------------------------
    steps:
      # Decide whether this matrix leg should execute based on the
      # user-selected build_type input.
      - name: Evaluate build target
        id: gate
        run: |
          INPUT="${{ github.event.inputs.build_type }}"
          TYPE="${{ matrix.type }}"
          if [[ "$INPUT" == "all" || "$INPUT" == "$TYPE" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      # Resolve branch-specific variables once so every subsequent step can
      # reference them cleanly from $GITHUB_ENV.
      - name: Resolve branch variables
        if: steps.gate.outputs.should_run == 'true'
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          IS_STAGING=false

          if [[ "$BRANCH" == "staging" ]]; then
            IS_STAGING=true
            ZIP_NAME="${{ matrix.zip_suffix }}-Staging.zip"
            RELEASE_PREFIX="${{ matrix.release_base }}-Staging"
            TELEGRAM_VERSION="${{ matrix.telegram_label }} [STAGING]"
            TELEGRAM_TAGS="${{ matrix.telegram_tags_staging }}"
            RELEASE_TAGS="${{ matrix.release_tags_staging }}"
          else
            ZIP_NAME="${{ matrix.zip_suffix }}.zip"
            RELEASE_PREFIX="${{ matrix.release_base }}"
            TELEGRAM_VERSION="${{ matrix.telegram_label }}"
            TELEGRAM_TAGS="${{ matrix.telegram_tags_main }}"
            RELEASE_TAGS="${{ matrix.release_tags_main }}"
          fi

          {
            echo "IS_STAGING=$IS_STAGING"
            echo "KERNEL_BRANCH=$BRANCH"
            echo "ZIP_NAME=$ZIP_NAME"
            echo "RELEASE_PREFIX=$RELEASE_PREFIX"
            echo "TELEGRAM_VERSION=$TELEGRAM_VERSION"
            echo "TELEGRAM_TAGS=$TELEGRAM_TAGS"
            echo "RELEASE_TAGS=$RELEASE_TAGS"
          } >> "$GITHUB_ENV"

      # Map the toolchain input to its download URL and extraction strategy.
      - name: Configure toolchain
        if: steps.gate.outputs.should_run == 'true'
        run: |
          case "${{ github.event.inputs.clang }}" in
            greenforce)
              CLANG_URL="https://github.com/greenforce-project/greenforce_clang/releases/download/20260410/gf-clang-22.1.4-20260410.tar.gz"
              CLANG_TYPE="dir"
              ;;
            llvm)
              CLANG_URL="https://mirrors.edge.kernel.org/pub/tools/llvm/files/llvm-22.1.4-x86_64.tar.gz"
              CLANG_TYPE="flat"
              ;;
            zyc)
              CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250401-release/Clang-20.0.0git-20250401.tar.gz"
              CLANG_TYPE="dir"
              ;;
            aosp)
              CLANG_URL="https://github.com/bachnxuan/aosp_clang_mirror/releases/download/clang-r584948b-14863223/clang-r584948b.tar.gz"
              CLANG_TYPE="dir"
              ;;
          esac

          CLANG_FILENAME="$(basename "$CLANG_URL" .tar.gz)"

          {
            echo "CLANG_URL=$CLANG_URL"
            echo "CLANG_TYPE=$CLANG_TYPE"
            echo "CLANG_DIR=$CLANG_FILENAME"
            echo "CLANG_CACHE_KEY=$CLANG_FILENAME"
          } >> "$GITHUB_ENV"

      - name: Checkout repository
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4

      # Compute the release tag here so it is available for both the release
      # publish step and the Telegram notification.
      - name: Set release tag
        if: steps.gate.outputs.should_run == 'true'
        run: |
          if [[ "$IS_STAGING" == "true" ]]; then
            echo "RELEASE_TAG=${RELEASE_PREFIX}-${{ github.run_number }}-${{ github.run_attempt }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${RELEASE_PREFIX}-${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Reclaim disk space
        if: steps.gate.outputs.should_run == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc
          sudo apt-get clean

      - name: Install build dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget bc bison flex \
            libssl-dev libelf-dev zip cpio

      - name: Restore toolchain cache
        if: steps.gate.outputs.should_run == 'true'
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/${{ env.CLANG_DIR }}
          key: ${{ env.CLANG_CACHE_KEY }}

      - name: Download and extract Clang
        if: steps.gate.outputs.should_run == 'true' && steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          if [[ "$CLANG_TYPE" == "flat" ]]; then
            # Archive already extracts into a top-level named directory.
            wget -q "$CLANG_URL"
            tar -xzf "$(basename "$CLANG_URL")"
            rm "$(basename "$CLANG_URL")"
          else
            # Archive is a flat tarball; wrap it in its own directory.
            mkdir -p "$CLANG_DIR"
            wget -q -O clang.tar.gz "$CLANG_URL"
            tar -xzf clang.tar.gz -C "$CLANG_DIR"
            rm clang.tar.gz
          fi

      - name: Export Clang to PATH
        if: steps.gate.outputs.should_run == 'true'
        run: echo "CLANG_PATH=$(pwd)/$CLANG_DIR/bin" >> "$GITHUB_ENV"

      - name: Clone kernel source
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git clone \
            --branch "$KERNEL_BRANCH" \
            --depth=1 \
            "${{ secrets.KERNEL_SOURCE }}" \
            kernel

      # -----------------------------------------------------------------------
      # SUSFS variant — KernelSU Next integration
      # -----------------------------------------------------------------------
      - name: Integrate KernelSU Next + SUSFS
        if: steps.gate.outputs.should_run == 'true' && matrix.type == 'susfs'
        run: |
          cd kernel

          # Set up KernelSU Next (dev-susfs variant)
          curl -LSs \
            "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/next-susfs/kernel/setup.sh" \
            | bash -s dev-susfs

          echo "KSU_COMMIT=$(git -C KernelSU-Next log -1 --pretty=format:'%s (%an)')" >> "$GITHUB_ENV"

          # Clone SUSFS patches for android12 GKI 5.10
          git clone --depth=1 \
            https://gitlab.com/simonpunk/susfs4ksu \
            -b gki-android12-5.10 \
            .susfs

          echo "SUSFS_COMMIT=$(git -C .susfs log -1 --pretty=format:'%s (%an)')" >> "$GITHUB_ENV"

          # Apply SUSFS file overlays and kernel patch
          PATCHES=".susfs/kernel_patches"
          cp -R "$PATCHES/fs/"      ./fs/
          cp -R "$PATCHES/include/" ./include/
          patch -p1 --forward < "$PATCHES"/*.patch || true

      - name: Apply all-managers patch
        if: steps.gate.outputs.should_run == 'true' && matrix.type == 'susfs'
        run: |
          curl -LSs "${{ secrets.PATCH_URL }}" -o /tmp/ksun-allmanager.patch
          patch -p1 --forward -d kernel/KernelSU-Next < /tmp/ksun-allmanager.patch

      # -----------------------------------------------------------------------
      # Defconfig overlay — appended via printf to avoid heredoc quoting issues
      # -----------------------------------------------------------------------
      - name: Apply defconfig overlay
        if: steps.gate.outputs.should_run == 'true'
        run: |
          DEFCONFIG="kernel/arch/arm64/configs/gki_defconfig"

          if [[ "${{ matrix.type }}" == "susfs" ]]; then
            printf '%s\n' "${{ secrets.CONFIG_LINES_SUSFS }}" >> "$DEFCONFIG"
          else
            printf '%s\n' "${{ secrets.CONFIG_LINES_VANILLA }}" >> "$DEFCONFIG"
          fi

      # -----------------------------------------------------------------------
      # Compile
      # -----------------------------------------------------------------------
      - name: Compile kernel
        if: steps.gate.outputs.should_run == 'true'
        run: |
          export TZ="Asia/Jakarta"
          export PATH="$CLANG_PATH:$PATH"
          export KBUILD_BUILD_USER="builder-dev"
          export KBUILD_BUILD_HOST="${{ matrix.build_host }}"

          MAKE_ARGS=(
            ARCH=arm64
            LLVM=1
            LLVM_IAS=1
            O=out
            CROSS_COMPILE=aarch64-linux-gnu-
          )

          cd kernel
          make "${MAKE_ARGS[@]}" gki_defconfig
          make "${MAKE_ARGS[@]}" -j"$(nproc --all)" Image

      # -----------------------------------------------------------------------
      # Collect build metadata for use in release notes and Telegram message
      # -----------------------------------------------------------------------
      - name: Collect build metadata
        if: steps.gate.outputs.should_run == 'true'
        run: |
          {
            echo "GIT_BRANCH=$(git -C kernel rev-parse --abbrev-ref HEAD)"
            echo "GIT_COMMIT=$(git -C kernel log -1 --pretty=format:'%s (%an)')"
            echo "KERNEL_VER=$(sed 's/.*\"\(.*\)\".*/\1/' kernel/out/include/generated/utsrelease.h)"
            echo "COMPILER=$("$CLANG_PATH/clang" --version | head -n1)"
            echo "BUILD_DATE=$(TZ=Asia/Jakarta date '+%d/%m/%Y %H:%M WIB')"
          } >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # Package AnyKernel3 flashable ZIP
      # -----------------------------------------------------------------------
      - name: Package flashable ZIP
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git clone --depth=1 -b gki-2.0 "${{ secrets.AK3_REPO }}" ak3
          cp kernel/out/arch/arm64/boot/Image ak3/
          cd ak3 && zip -r9 "$ZIP_NAME" . --exclude '*.git*' --exclude '*.github*'

      # -----------------------------------------------------------------------
      # Publish GitHub Release first so the download URL is ready for Telegram
      # -----------------------------------------------------------------------
      - name: Prune old GitHub Releases
        if: steps.gate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          STALE=$(gh release list \
            --repo AnyaKernel/Kernel-Release \
            --limit 100 \
            --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[25:] | .[].tagName')

          for TAG in $STALE; do
            echo "Deleting stale release: $TAG"
            gh release delete "$TAG" \
              --repo AnyaKernel/Kernel-Release \
              --yes --cleanup-tag 2>/dev/null || true
          done

      - name: Publish GitHub Release
        if: steps.gate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          EXTRA_NOTES=""
          if [[ "${{ matrix.type }}" == "susfs" ]]; then
            EXTRA_NOTES="**🔐 KSU commit:** $KSU_COMMIT
          **🛡️ SUSFS commit:** $SUSFS_COMMIT"
          fi

          COMMON_BODY="**🌿 Branch:** \`$GIT_BRANCH\`
          **🐧 Linux version:** \`$KERNEL_VER\`
          **📆 Build date:** \`$BUILD_DATE\`
          **🦎 Variant:** $TELEGRAM_VERSION
          **♻️ Latest commit:** $GIT_COMMIT
          $EXTRA_NOTES
          **⚙️ Compiler:** $COMPILER

          ---
          $RELEASE_TAGS"

          if [[ "$IS_STAGING" == "true" ]]; then
            gh release create "$RELEASE_TAG" \
              --repo AnyaKernel/Kernel-Release \
              "ak3/$ZIP_NAME" \
              --title "⚠️ [STAGING] Anya Kernel | $TELEGRAM_VERSION | GKI 5.10 | $BUILD_DATE" \
              --notes "## ⚠️ STAGING BUILD — Anya Kernel — $TELEGRAM_VERSION

          > Built from the **staging** branch. Not intended for daily use.

          $COMMON_BODY" \
              --prerelease \
            || gh release upload "$RELEASE_TAG" \
                --repo AnyaKernel/Kernel-Release \
                "ak3/$ZIP_NAME" \
                --clobber
          else
            gh release create "$RELEASE_TAG" \
              --repo AnyaKernel/Kernel-Release \
              "ak3/$ZIP_NAME" \
              --title "Anya Kernel | $TELEGRAM_VERSION | GKI 5.10 | $BUILD_DATE" \
              --notes "## 🌸 Anya Kernel — $TELEGRAM_VERSION

          $COMMON_BODY" \
              --latest
          fi

      # -----------------------------------------------------------------------
      # Notify Telegram with a link to the release (no direct file upload)
      # -----------------------------------------------------------------------
      - name: Send Telegram notification
        if: steps.gate.outputs.should_run == 'true'
        run: |
          RELEASE_URL="https://github.com/AnyaKernel/Kernel-Release/releases/tag/$RELEASE_TAG"

          EXTRA_INFO=""
          if [[ "${{ matrix.type }}" == "susfs" ]]; then
            EXTRA_INFO="
          🔐 <b>KSU commit:</b> $KSU_COMMIT
          🛡️ <b>SUSFS commit:</b> $SUSFS_COMMIT"
          fi

          STAGING_HEADER=""
          if [[ "$IS_STAGING" == "true" ]]; then
            STAGING_HEADER="⚠️ <b>[STAGING BUILD]</b>

          "
          fi

          MESSAGE="${STAGING_HEADER}<b>Anya Kernel — $TELEGRAM_VERSION</b>
          🌱 <b>Branch:</b> <code>$GIT_BRANCH</code>
          🐧 <b>Linux version:</b> <code>$KERNEL_VER</code>
          📆 <b>Build date:</b> <code>$BUILD_DATE</code>
          🦎 <b>Variant:</b> $TELEGRAM_VERSION
          ♻️ <b>Latest commit:</b> $GIT_COMMIT${EXTRA_INFO}
          ⚙️ <b>Compiler:</b> $COMPILER

          $TELEGRAM_TAGS

          📥 <b>Download:</b> <a href=\"$RELEASE_URL\">GitHub Release</a>"

          curl --fail --silent --show-error \
            -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=$MESSAGE"
