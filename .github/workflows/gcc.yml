name: Valeryn Kernel — Hybrid CI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Kernel branch
        required: true
        default: staging
        type: choice
        options:
          - staging
          - main

env:
  GCC_URL: https://github.com/mvaisakh/gcc-build/releases/download/06052026/eva-gcc-arm64-06052026.xz
  GCC_DIR: eva-gcc-arm64-06052026
  CLANG_URL: https://github.com/greenforce-project/greenforce_clang/releases/download/20260410/gf-clang-22.1.4-20260410.tar.gz
  CLANG_DIR: gf-clang-22.1.4-20260410

jobs:
  build:
    name: sm6115 · clang+gcc · ${{ github.event.inputs.branch }}
    runs-on: ubuntu-latest

    steps:
      - name: Reclaim disk space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc && sudo apt clean

      - name: Install build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y git curl wget bc bison flex libssl-dev libelf-dev zip cpio xz-utils file

      - name: Restore toolchain cache
        uses: actions/cache@v4
        id: cache-toolchain
        with:
          path: |
            ${{ github.workspace }}/${{ env.GCC_DIR }}
            ${{ github.workspace }}/${{ env.CLANG_DIR }}
          key: toolchain-${{ env.GCC_DIR }}-${{ env.CLANG_DIR }}

      - name: Download toolchains
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          # Clang
          mkdir -p "$CLANG_DIR"
          wget -qO clang.tar.gz "$CLANG_URL"
          tar -xf clang.tar.gz -C "$CLANG_DIR" && rm clang.tar.gz

          # GCC (cross-compile only)
          mkdir -p "$GCC_DIR"
          wget -qO gcc.archive "$GCC_URL"
          case "$(file -b gcc.archive)" in
            *"XZ compressed"*)   tar -xJf gcc.archive -C "$GCC_DIR" --strip-components=1 ;;
            *"gzip compressed"*) tar -xzf gcc.archive -C "$GCC_DIR" --strip-components=1 ;;
            *"bzip2 compressed"*)tar -xjf gcc.archive -C "$GCC_DIR" --strip-components=1 ;;
            *"tar archive"*)     tar -xf  gcc.archive -C "$GCC_DIR" --strip-components=1 ;;
            *"Zip archive"*)     unzip -q  gcc.archive -d "$GCC_DIR" ;;
            *) echo "Unknown archive format"; exit 1 ;;
          esac
          rm -f gcc.archive

      - name: Checkout kernel source
        run: git clone --branch ${{ github.event.inputs.branch }} --depth=1 https://github.com/ip2na/anya_xiaomi_sm6115.git kernel

      - name: Integrate KernelSU Next
        run: curl -LSs "https://raw.githubusercontent.com/Sorayukii/KernelSU-Next/stable/kernel/setup.sh" | bash -s hookless
        working-directory: kernel

      - name: Apply defconfig overlay
        run: printf '%s\n' "${{ secrets.VALERYN_CONFIG_LINES }}" >> kernel/arch/arm64/configs/vendor/bengal-perf_defconfig

      - name: Compile
        run: |
          CLANG_BIN="${{ github.workspace }}/${{ env.CLANG_DIR }}/bin"
          GCC_BIN="${{ github.workspace }}/${{ env.GCC_DIR }}/bin"
          GCC_PREFIX=$(ls "$GCC_BIN" | grep -m1 "gcc$" | sed 's/gcc$//')

          export TZ="Asia/Jakarta"
          export PATH="$CLANG_BIN:$GCC_BIN:$PATH"
          export KBUILD_BUILD_USER="builder-dev"
          export KBUILD_BUILD_HOST="anyaprjk"        
          export KCFLAGS="-O3 \
            -march=armv8-a+crc+simd \
            -mtune=cortex-a53 \
            -mllvm -polly \
            -mllvm -polly-vectorizer=stripmine \
            -fno-semantic-interposition"
          export KLDFLAGS="-flto=thin"

          MAKE="make ARCH=arm64 O=out \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=$GCC_PREFIX \
            LLVM_IAS=1"

          $MAKE vendor/bengal-perf_defconfig
          $MAKE -j$(nproc) Image.gz dtbs
        working-directory: kernel

      - name: Collect build metadata
        run: |
          CLANG_BIN="${{ github.workspace }}/${{ env.CLANG_DIR }}/bin"
          {
            echo "BRANCH=$(git -C kernel rev-parse --abbrev-ref HEAD)"
            echo "COMMIT=$(git -C kernel log -1 --pretty=format:'%s (%an)')"
            echo "KERNEL_VER=$(sed 's/.*\"\(.*\)\".*/\1/' kernel/out/include/generated/utsrelease.h)"
            echo "COMPILER=$($CLANG_BIN/clang --version | head -1)"
            echo "DATE=$(TZ=Asia/Jakarta date '+%d/%m/%Y %H:%M WIB')"
            echo "ZIP_NAME=Valeryn-SM6115-Hybrid-${{ github.run_number }}.zip"
          } >> $GITHUB_ENV

      - name: Package flashable ZIP
        run: |
          git clone -b gki-1.0 --depth=1 https://github.com/ip2na/Anykernel3.git ak3
          mkdir -p ak3/dtbs
          cp kernel/out/arch/arm64/boot/Image.gz ak3/
          find kernel/out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} ak3/dtbs/ \; 2>/dev/null || true
          [ -f kernel/out/arch/arm64/boot/dtbo.img ] && cp kernel/out/arch/arm64/boot/dtbo.img ak3/
          cd ak3 && zip -r9 "$ZIP_NAME" . -x "*.git*" "*.github*" && ls -lh "$ZIP_NAME"

      - name: Publish to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ZIP_PATH: ${{ github.workspace }}/ak3/${{ env.ZIP_NAME }}
        run: |
          python3 - <<'EOF'
          import requests, os

          caption = (
            "<b>Valeryn Kernel — SM6115 (Hybrid)</b>\n"
            f"🌱 <b>Branch:</b> <code>{os.environ['BRANCH']}</code>\n"
            f"🐧 <b>Linux version:</b> <code>{os.environ['KERNEL_VER']}</code>\n"
            f"📆 <b>Build date:</b> <code>{os.environ['DATE']}</code>\n"
            f"♻️ <b>Latest commit:</b> {os.environ['COMMIT']}\n"
            f"⚙️ <b>Compiler:</b> {os.environ['COMPILER']}"
          )

          with open(os.environ["ZIP_PATH"], "rb") as f:
            r = requests.post(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendDocument",
              data={"chat_id": os.environ["TELEGRAM_CHAT_ID"], "parse_mode": "HTML", "caption": caption},
              files={"document": f},
              timeout=300
            )
          print(f"Status: {r.status_code}\n{r.text}")
          r.raise_for_status()
          EOF

      - name: Upload artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-zip-hybrid-failed
          path: ak3/${{ env.ZIP_NAME }}
