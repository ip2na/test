name: Build chime Kernel gcc

on:
  workflow_dispatch:

jobs:
  build:
    name: Build chime Kernel
    runs-on: ubuntu-latest

    steps:
      - name: Set GCC Variables
        run: |
          GCC_URL="https://github.com/mvaisakh/gcc-build/releases/download/06052026/eva-gcc-arm64-06052026.xz"
          FILENAME=$(basename "$GCC_URL")
          FILENAME="${FILENAME%.xz}"
          FILENAME="${FILENAME%.tar.gz}"
          echo "GCC_URL=$GCC_URL" >> $GITHUB_ENV
          echo "GCC_DIR=$FILENAME" >> $GITHUB_ENV
          echo "GCC_CACHE_KEY=$FILENAME" >> $GITHUB_ENV

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo apt clean

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git curl wget bc bison flex libssl-dev libelf-dev zip cpio xz-utils file

      - name: Cache GCC
        id: cache-gcc
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/${{ env.GCC_DIR }}
          key: ${{ env.GCC_CACHE_KEY }}

      - name: Setup GCC
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$GCC_DIR"
          wget -O gcc.archive "$GCC_URL"

          FILETYPE=$(file -b gcc.archive)
          echo "Detected file type: $FILETYPE"

           case "$FILETYPE" in
            *"XZ compressed"*)
              tar -xJf gcc.archive -C "$GCC_DIR" --strip-components=1
              ;;
            *"gzip compressed"*)
              tar -xzf gcc.archive -C "$GCC_DIR" --strip-components=1
              ;;
            *"bzip2 compressed"*)
              tar -xjf gcc.archive -C "$GCC_DIR" --strip-components=1
              ;;
            *"Zip archive"*)
              unzip -q gcc.archive -d "$GCC_DIR"
              ;;
            *"POSIX tar archive"* | *"tar archive"*)
              tar -xf gcc.archive -C "$GCC_DIR" --strip-components=1
              ;;
            *)
              echo "Unknown format: $FILETYPE"
              exit 1
              ;;
          esac       

          rm -f gcc.archive
          echo "GCC bin contents:"
          ls "$GCC_DIR/bin/" | head -20

      - name: Set GCC PATH
        run: echo "GCC_PATH=$(pwd)/$GCC_DIR/bin" >> $GITHUB_ENV

      - name: Clone Kernel Source
        run: |
          git clone --branch staging --depth=1 https://github.com/ip2na/anya_xiaomi_sm6115.git kernel

      - name: Setup KernelSU Next (Hookless)
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/Sorayukii/KernelSU-Next/stable/kernel/setup.sh" | bash -s hookless

      - name: Inject Config
        run: |
          CONFIG_FILE="kernel/arch/arm64/configs/vendor/bengal-perf_defconfig"
          printf '%s\n' "${{ secrets.VALERYN_CONFIG_LINES }}" >> "$CONFIG_FILE"
          echo "Config injected:"
          tail -20 "$CONFIG_FILE"

      - name: Build Kernel
        run: |
          cd kernel
          export TZ="Asia/Jakarta"
          export PATH="$GCC_PATH:$PATH"
          export KBUILD_BUILD_USER="builder-dev"
          export KBUILD_BUILD_HOST="anyaprjk"

          GCC_PREFIX=$(ls "$GCC_PATH" | grep -m1 "gcc$" | sed 's/gcc$//')
          echo "Using GCC prefix: $GCC_PREFIX"

          make ARCH=arm64 \
            CROSS_COMPILE="$GCC_PREFIX" \
            CC="${GCC_PREFIX}gcc" \
            O=out vendor/bengal-perf_defconfig

          make ARCH=arm64 \
            CROSS_COMPILE="$GCC_PREFIX" \
            CC="${GCC_PREFIX}gcc" \
            O=out -j$(nproc --all) Image.gz dtbs

      - name: Generate Build Info
        run: |
          GCC_PREFIX=$(ls "$GCC_PATH" | grep -m1 "gcc$" | sed 's/gcc$//')
          echo "BRANCH=$(git -C kernel rev-parse --abbrev-ref HEAD)" >> $GITHUB_ENV
          echo "COMMIT=$(git -C kernel log -1 --pretty=format:'%s (%an)')" >> $GITHUB_ENV
          echo "KERNEL_VER=$(cat kernel/out/include/generated/utsrelease.h | sed 's/.*\"\(.*\)\".*/\1/')" >> $GITHUB_ENV
          echo "COMPILER=$($GCC_PATH/${GCC_PREFIX}gcc --version | head -n 1)" >> $GITHUB_ENV
          echo "DATE=$(TZ=Asia/Jakarta date '+%d/%m/%Y %H:%M WIB')" >> $GITHUB_ENV
          echo "ZIP_NAME=Valeryn-SM6115-${{ github.run_number }}.zip" >> $GITHUB_ENV

      - name: Clone AnyKernel3
        run: |
          git clone -b gki-1.0 --depth=1 https://github.com/ip2na/Anykernel3.git ak3

      - name: Copy Kernel Artifacts
        run: |
          mkdir -p ak3/dtbs
          cp kernel/out/arch/arm64/boot/Image.gz ak3/
          find kernel/out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} ak3/dtbs/ \; 2>/dev/null || true
          if [ -f kernel/out/arch/arm64/boot/dtbo.img ]; then
            cp kernel/out/arch/arm64/boot/dtbo.img ak3/
          fi

      - name: Pack ZIP
        run: |
          cd ak3
          zip -r9 "$ZIP_NAME" * -x "*.git*" -x "*.github*"
          ls -lh "$ZIP_NAME"

      - name: Send ZIP to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ZIP_PATH: ${{ github.workspace }}/ak3/${{ env.ZIP_NAME }}
        run: |
          python3 - <<'EOF'
          import requests, os

          token    = os.environ["TELEGRAM_TOKEN"]
          chat_id  = os.environ["TELEGRAM_CHAT_ID"]
          zip_path = os.environ["ZIP_PATH"]

          caption = (
            "<b>Valeryn Kernel \u2014 SM6115</b>\n"
            f"\U0001f331 <b>Branch:</b> <code>{os.environ['BRANCH']}</code>\n"
            f"\U0001f427 <b>Linux version:</b> <code>{os.environ['KERNEL_VER']}</code>\n"
            f"\U0001f4c6 <b>Build date:</b> <code>{os.environ['DATE']}</code>\n"
            f"\u267b\ufe0f <b>Latest commit:</b> {os.environ['COMMIT']}\n"
            f"\u2699\ufe0f <b>Compiler:</b> {os.environ['COMPILER']}"
          )

          print(f"Sending: {zip_path}")
          with open(zip_path, "rb") as f:
            r = requests.post(
              f"https://api.telegram.org/bot{token}/sendDocument",
              data={"chat_id": chat_id, "parse_mode": "HTML", "caption": caption},
              files={"document": f},
              timeout=300
            )

          print(f"Status: {r.status_code}")
          print(r.text)
          r.raise_for_status()
          EOF

      - name: Upload ZIP artifact (debug on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-zip-failed
          path: ak3/${{ env.ZIP_NAME }}
